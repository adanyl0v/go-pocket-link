version: '3.9'

services:
  postgres_db:
    image: postgres:alpine
    container_name: postgres_db
    restart: always
    ports:
      - '${DB_POSTGRES_PORT}:5432'
    environment:
      - POSTGRES_PASSWORD=${DB_POSTGRES_PASS}
      - POSTGRES_DB=go_pocket_link
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_db-data:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD', 'pg_isready' ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_db-data:
    driver: local